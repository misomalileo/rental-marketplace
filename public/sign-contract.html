<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Sign Contract | Khomo Lathu</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body {
      background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
      padding: 2rem;
      min-height: 100vh;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 32px;
      padding: 2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }
    h2 {
      font-size: 1.8rem;
      font-weight: 800;
      color: #1e293b;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      border-left: 4px solid #2563eb;
      padding-left: 1rem;
    }
    .contract-info {
      background: #f8fafc;
      border-radius: 20px;
      padding: 1rem;
      margin-bottom: 1rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 0.8rem;
    }
    .info-card {
      background: white;
      border-radius: 16px;
      padding: 0.8rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
    .signature-pad {
      border: 2px dashed #cbd5e1;
      border-radius: 24px;
      padding: 1.5rem;
      margin: 1.5rem 0;
      background: #fefce8;
    }
    canvas {
      border: 2px solid #cbd5e1;
      border-radius: 16px;
      background: white;
      width: 100%;
      height: 150px;
      cursor: crosshair;
    }
    .btn-group {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }
    .btn {
      padding: 0.7rem 1.5rem;
      border-radius: 40px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .btn-success { background: #10b981; color: white; }
    .btn-outline { background: white; border: 1px solid #cbd5e1; color: #1e293b; }
    .btn-primary { background: #2563eb; color: white; }
    .status {
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 20px;
      text-align: center;
      font-weight: 500;
    }
    .status.success { background: #dcfce7; color: #15803d; }
    .status.info { background: #dbeafe; color: #1e40af; }
    .pdf-placeholder {
      background: #f1f5f9;
      border-radius: 20px;
      padding: 2rem;
      text-align: center;
      margin: 1rem 0;
    }
    @media (max-width: 640px) {
      body { padding: 1rem; }
      .container { padding: 1.5rem; }
      h2 { font-size: 1.4rem; }
      .btn-group { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2><i class="fas fa-file-signature"></i> Sign Lease Contract</h2>
    <div id="contractInfo" class="contract-info"></div>
    <div class="pdf-placeholder">
      <i class="fas fa-file-pdf" style="font-size: 3rem; color: #ef4444;"></i>
      <p style="margin-top: 0.5rem;">Your contract is ready. Download it after signing.</p>
    </div>
    <div class="signature-pad">
      <p><i class="fas fa-pen-fancy"></i> Your Signature (draw or type)</p>
      <canvas id="signatureCanvas" width="400" height="150"></canvas>
      <div class="btn-group">
        <button id="clearSignature" class="btn btn-outline"><i class="fas fa-eraser"></i> Clear</button>
        <button id="signContract" class="btn btn-success"><i class="fas fa-check-circle"></i> Sign Contract</button>
        <button id="downloadPdfBtn" class="btn btn-primary" style="display: none;"><i class="fas fa-download"></i> Download Contract</button>
      </div>
    </div>
    <div id="status" class="status info"><i class="fas fa-info-circle"></i> Please draw your signature and click "Sign Contract".</div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location = 'login.html';
    const urlParams = new URLSearchParams(window.location.search);
    const contractId = urlParams.get('id');
    if (!contractId) window.location = 'index.html';

    let contract = null;
    let negotiationId = null;
    const canvas = document.getElementById('signatureCanvas');
    const signaturePad = new SignaturePad(canvas);
    const statusDiv = document.getElementById('status');
    const downloadBtn = document.getElementById('downloadPdfBtn');

    async function loadContract() {
      try {
        const res = await fetch(`/api/lease/contract/${contractId}`, {
          headers: { Authorization: 'Bearer ' + token }
        });
        if (res.ok) {
          contract = await res.json();
          negotiationId = contract.negotiationId;
          document.getElementById('contractInfo').innerHTML = `
            <div class="info-card"><i class="fas fa-home"></i> <strong>Property:</strong> ${contract.houseId?.name || 'N/A'}</div>
            <div class="info-card"><i class="fas fa-user-tie"></i> <strong>Landlord:</strong> ${contract.landlordId?.name}</div>
            <div class="info-card"><i class="fas fa-user"></i> <strong>Tenant:</strong> ${contract.tenantId?.name}</div>
            <div class="info-card"><i class="fas fa-flag-checkered"></i> <strong>Status:</strong> ${contract.status}</div>
          `;
          if (contract.signedByLandlord && contract.signedByTenant) {
            statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> Both parties have signed. Contract is active!';
            statusDiv.className = 'status success';
            document.getElementById('signContract').disabled = true;
            downloadBtn.style.display = 'inline-flex';
          }
        } else {
          statusDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Failed to load contract details.';
        }
      } catch (err) {
        statusDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Network error.';
      }
    }

    document.getElementById('clearSignature').addEventListener('click', () => {
      signaturePad.clear();
    });

    document.getElementById('signContract').addEventListener('click', async () => {
      if (signaturePad.isEmpty()) {
        alert('Please provide your signature');
        return;
      }
      const signatureData = signaturePad.toDataURL();
      statusDiv.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Signing...';
      try {
        const res = await fetch(`/api/lease/sign/${contractId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
          body: JSON.stringify({ signature: signatureData })
        });
        const data = await res.json();
        if (res.ok) {
          statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> Contract signed successfully! You can now download the contract.';
          statusDiv.className = 'status success';
          document.getElementById('signContract').disabled = true;
          downloadBtn.style.display = 'inline-flex';
          await loadContract();
        } else {
          statusDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Failed: ' + (data.message || 'Unknown error');
        }
      } catch (err) {
        statusDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Network error.';
      }
    });

    downloadBtn.addEventListener('click', async () => {
      if (!negotiationId) return;
      try {
        const res = await fetch(`/api/lease/download/${negotiationId}`, {
          headers: { Authorization: 'Bearer ' + token }
        });
        if (res.ok) {
          const blob = await res.blob();
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `Lease_Agreement_${negotiationId}.pdf`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          window.URL.revokeObjectURL(url);
        } else {
          alert('Failed to download contract. Please try again.');
        }
      } catch (err) {
        alert('Network error while downloading.');
      }
    });

    loadContract();
  </script>
</body>
</html>

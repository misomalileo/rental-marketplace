<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Sign Contract | Khomo Lathu</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #eef2f6 100%);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 1rem;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 32px;
      box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 100%);
      color: white;
      padding: 1.5rem;
      text-align: center;
    }
    .header h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .header p {
      font-size: 0.85rem;
      opacity: 0.9;
      margin-top: 0.3rem;
    }
    .content {
      padding: 1.5rem;
    }
    .info-grid {
      background: #f8fafc;
      border-radius: 24px;
      padding: 1rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }
    .info-card {
      background: white;
      border-radius: 20px;
      padding: 0.8rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
      border: 1px solid #e2e8f0;
    }
    .info-card i {
      color: #FF8C42;
      width: 28px;
      font-size: 1rem;
    }
    .info-card strong {
      font-size: 0.75rem;
      color: #64748b;
      display: block;
      margin-bottom: 0.2rem;
    }
    .info-card span {
      font-size: 0.85rem;
      font-weight: 500;
      color: #1e293b;
    }
    .signature-section {
      background: #fefce8;
      border-radius: 24px;
      padding: 1.2rem;
      margin: 1rem 0;
      border: 1px solid #fde047;
    }
    .signature-section h3 {
      font-size: 1rem;
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #854d0e;
    }
    canvas {
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      background: white;
      width: 100%;
      max-width: 450px;
      height: auto;
      touch-action: none;
      cursor: crosshair;
    }
    .btn-group {
      display: flex;
      gap: 0.8rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }
    .btn {
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      border: none;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .btn-primary { background: #FF8C42; color: white; }
    .btn-secondary { background: #e2e8f0; color: #1e293b; }
    .btn-success { background: #10b981; color: white; }
    .btn-outline { background: white; border: 1px solid #cbd5e1; color: #1e293b; }
    .btn-danger { background: #ef4444; color: white; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.05); }
    .status {
      margin-top: 1rem;
      padding: 0.8rem;
      border-radius: 20px;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 500;
      display: none;
    }
    .status.success { background: #dcfce7; color: #15803d; display: block; }
    .status.info { background: #dbeafe; color: #1e40af; display: block; }
    .status.warning { background: #fef3c7; color: #b45309; display: block; }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      padding: 10px 20px;
      border-radius: 40px;
      z-index: 1001;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @media (max-width: 640px) {
      body { padding: 0.5rem; }
      .content { padding: 1rem; }
      .info-grid { grid-template-columns: 1fr; }
      .btn-group { justify-content: center; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><i class="fas fa-file-signature"></i> Sign Tenancy Contract</h1>
    <p>Review the agreement and add your digital signature</p>
  </div>
  <div class="content">
    <div id="contractInfo" class="info-grid"></div>
    <div class="signature-section">
      <h3><i class="fas fa-pen-fancy"></i> Your Signature</h3>
      <canvas id="signatureCanvas" width="450" height="150"></canvas>
      <div class="btn-group">
        <button id="clearBtn" class="btn btn-outline"><i class="fas fa-eraser"></i> Clear</button>
        <button id="signBtn" class="btn btn-success"><i class="fas fa-check-circle"></i> Sign Contract</button>
      </div>
    </div>
    <div id="status" class="status info"><i class="fas fa-info-circle"></i> Draw your signature and click "Sign Contract".</div>
    <div class="btn-group" style="justify-content: space-between; margin-top: 1rem; flex-wrap: wrap;">
      <button id="refreshBtn" class="btn btn-secondary"><i class="fas fa-sync-alt"></i> Refresh Status</button>
      <button id="forcePdfBtn" class="btn btn-danger"><i class="fas fa-file-pdf"></i> Generate PDF Now</button>
      <button id="downloadBtn" class="btn btn-primary" style="display: none;"><i class="fas fa-download"></i> Download Contract</button>
    </div>
  </div>
</div>

<script>
  const token = localStorage.getItem('token');
  if (!token) window.location = 'login.html';
  const urlParams = new URLSearchParams(window.location.search);
  const contractId = urlParams.get('id');
  if (!contractId) window.location = 'index.html';

  let contract = null;
  let negotiationId = null;
  let currentDownloadUrl = null;
  let signaturePad = null;
  let currentUserId = null;

  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    currentUserId = payload.id;
  } catch(e) { console.error('Token parse error', e); }

  function showToast(message, type = 'info') {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  async function loadContract() {
    try {
      const res = await fetch(`/api/lease/contract/${contractId}`, {
        headers: { Authorization: 'Bearer ' + token }
      });
      if (res.ok) {
        contract = await res.json();
        negotiationId = contract.negotiationId;
        renderContractInfo();
        initSignaturePad();
        updateUIAfterLoad();
      } else {
        const error = await res.json();
        showToast(error.message || 'Failed to load contract', 'error');
      }
    } catch (err) {
      showToast('Network error loading contract', 'error');
    }
  }

  function renderContractInfo() {
    const container = document.getElementById('contractInfo');
    const landlordSigned = contract.signedByLandlord;
    const tenantSigned = contract.signedByTenant;
    container.innerHTML = `
      <div class="info-card"><i class="fas fa-home"></i><strong>Property</strong><span>${contract.houseId?.name || 'N/A'}</span></div>
      <div class="info-card"><i class="fas fa-user-tie"></i><strong>Landlord</strong><span>${contract.landlordId?.name} ${landlordSigned ? '✓' : '⏳'}</span></div>
      <div class="info-card"><i class="fas fa-user"></i><strong>Tenant</strong><span>${contract.tenantId?.name} ${tenantSigned ? '✓' : '⏳'}</span></div>
      <div class="info-card"><i class="fas fa-flag-checkered"></i><strong>Status</strong><span>${contract.status}</span></div>
    `;
  }

  function updateUIAfterLoad() {
    const isLandlord = contract.landlordId._id === currentUserId;
    const userHasSigned = isLandlord ? contract.signedByLandlord : contract.signedByTenant;
    const bothSigned = contract.signedByLandlord && contract.signedByTenant;
    const signBtn = document.getElementById('signBtn');
    const statusDiv = document.getElementById('status');

    if (bothSigned) {
      signBtn.disabled = true;
      statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> Both parties have signed. Click "Generate PDF Now" to download.';
      statusDiv.className = 'status success';
    } else if (userHasSigned) {
      signBtn.disabled = true;
      statusDiv.innerHTML = '<i class="fas fa-clock"></i> You have already signed. Waiting for the other party. Click "Generate PDF Now" to see if both have signed.';
      statusDiv.className = 'status warning';
    } else {
      signBtn.disabled = false;
      statusDiv.innerHTML = '<i class="fas fa-pen-fancy"></i> Draw your signature and click "Sign Contract".';
      statusDiv.className = 'status info';
    }
  }

  function initSignaturePad() {
    const canvas = document.getElementById('signatureCanvas');
    if (!canvas) return;
    const ratio = Math.max(window.devicePixelRatio || 1, 1);
    canvas.width = canvas.offsetWidth * ratio;
    canvas.height = canvas.offsetHeight * ratio;
    canvas.getContext('2d').scale(ratio, ratio);
    signaturePad = new SignaturePad(canvas);
    signaturePad.clear();
  }

  async function generatePdf() {
    if (!negotiationId) {
      showToast('Negotiation ID not found', 'error');
      return;
    }
    const btn = document.getElementById('forcePdfBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating...';
    try {
      const res = await fetch(`/api/lease/force-pdf/${negotiationId}`, {
        headers: { Authorization: 'Bearer ' + token }
      });
      const data = await res.json();
      if (res.ok && data.downloadUrl) {
        currentDownloadUrl = data.downloadUrl;
        document.getElementById('downloadBtn').onclick = () => window.open(currentDownloadUrl, '_blank');
        document.getElementById('downloadBtn').style.display = 'inline-flex';
        showToast('PDF generated! Click download.', 'success');
      } else {
        showToast(data.message || 'Failed to generate PDF', 'error');
      }
    } catch (err) {
      showToast('Network error', 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-file-pdf"></i> Generate PDF Now';
    }
  }

  document.getElementById('clearBtn').addEventListener('click', () => {
    if (signaturePad) signaturePad.clear();
  });

  document.getElementById('refreshBtn').addEventListener('click', async () => {
    showToast('Refreshing...', 'info');
    await loadContract();
    showToast('Status updated', 'success');
  });

  document.getElementById('forcePdfBtn').addEventListener('click', generatePdf);

  document.getElementById('signBtn').addEventListener('click', async () => {
    if (!signaturePad || signaturePad.isEmpty()) {
      showToast('Please draw your signature first', 'error');
      return;
    }
    const signatureData = signaturePad.toDataURL();
    const btn = document.getElementById('signBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing...';
    try {
      const res = await fetch(`/api/lease/sign/${contractId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
        body: JSON.stringify({ signature: signatureData })
      });
      const data = await res.json();
      if (res.ok) {
        showToast('Signature saved!', 'success');
        await loadContract();
      } else {
        showToast(data.message || 'Failed to sign', 'error');
      }
    } catch (err) {
      showToast('Network error while signing', 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-check-circle"></i> Sign Contract';
    }
  });

  document.getElementById('downloadBtn').addEventListener('click', () => {
    if (currentDownloadUrl) {
      window.open(currentDownloadUrl, '_blank');
    } else {
      showToast('No PDF available. Click "Generate PDF Now" first.', 'error');
    }
  });

  loadContract();
</script>
</body>
</html>

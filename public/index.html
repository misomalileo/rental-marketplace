<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rental Marketplace | Blantyre Houses</title>
  <!-- Google Fonts & Leaflet CSS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#3498db">
  <style>
    /* === all your styles – keep them as you had === */
    /* For brevity, keep your existing CSS (I'm not repeating it here) */
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo" data-i18n="home">🏠 Rental Marketplace</div>
    <div class="nav-links">
      <a href="#" data-i18n="home">Home</a>
      <a href="#map" data-i18n="exploreMap">Explore Map</a>
      <a href="login.html" data-i18n="landlordLogin">Landlord Login</a>
      <select class="lang-select" onchange="setLanguage(this.value)">
        <option value="en">English</option>
        <option value="ny">Chichewa</option>
      </select>
      <select class="theme-select" onchange="setTheme(this.value)">
        <option value="light" data-i18n="light">Light</option>
        <option value="dark" data-i18n="dark">Dark</option>
        <option value="aquatic" data-i18n="aquatic">Aquatic</option>
      </select>
    </div>
  </nav>

  <header class="hero">
    <h1 data-i18n="heroTitle">Find Houses & Hostels in Blantyre</h1>
    <p data-i18n="heroSubtitle">Explore verified rentals posted by landlords</p>
  </header>

  <main class="main-container">

    <section class="filters">
      <input type="number" id="priceMin" data-i18n-placeholder="minPrice" placeholder="Min Price">
      <input type="number" id="priceMax" data-i18n-placeholder="maxPrice" placeholder="Max Price">
      <select id="bedrooms">
        <option value="" data-i18n="anyBedrooms">Any Bedrooms</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4+</option>
      </select>
      <select id="type">
        <option value="" data-i18n="anyType">Any Type</option>
        <option value="House">House</option>
        <option value="Hostel">Hostel</option>
      </select>
      <button id="nearMeBtn" data-i18n="nearMe"><i class="fas fa-map-marker-alt"></i> Near Me</button>
      <button id="applyFiltersBtn" data-i18n="applyFilters">Apply Filters</button>
    </section>

    <section class="amenities-filters">
      <label><input type="checkbox" id="filterWifi"> 📶 WiFi</label>
      <label><input type="checkbox" id="filterParking"> 🅿️ Parking</label>
      <label><input type="checkbox" id="filterFurnished"> 🛋️ Furnished</label>
      <label><input type="checkbox" id="filterPetFriendly"> 🐾 Pet Friendly</label>
    </section>

    <input type="text" id="searchInput" data-i18n-placeholder="searchPlaceholder" placeholder="Search by area or name...">

    <div class="category-tabs">
      <button class="tab-btn active" data-type="all">All</button>
      <button class="tab-btn" data-type="House">🏠 Houses</button>
      <button class="tab-btn" data-type="Hostel">🏨 Hostels</button>
      <button class="tab-btn" data-type="Apartment">🏢 Apartments</button>
      <button class="tab-btn" data-type="Room">🛏️ Rooms</button>
      <button class="tab-btn" data-type="Office">🏢 Offices</button>
    </div>

    <h2 style="margin: 1rem 0;" data-i18n="availableProperties">Available Properties</h2>
    <div id="houses-container" data-i18n="loading">Loading houses...</div>

    <div class="pagination" id="pagination"></div>

    <section class="map-section" id="map-section">
      <h2 data-i18n="mapView">📍 Map View</h2>
      <div id="map"></div>
    </section>

    <section class="gps-section">
      <h2 data-i18n="gpsLocator">📍 Property GPS Locator</h2>
      <button id="getLocationBtn" data-i18n="captureLocation"><i class="fas fa-location-dot"></i> Capture My Property Location</button>
      <p id="gpsStatus"></p>
      <input type="hidden" id="latitude">
      <input type="hidden" id="longitude">
    </section>

  </main>

  <footer>
    <span data-i18n="copyright">© 2026 Rental Marketplace Malawi</span>
    <br><br>
    <a href="terms.html" data-i18n="terms">Terms</a> | 
    <a href="privacy.html" data-i18n="privacy">Privacy</a> | 
    <a href="faq.html" data-i18n="faq">FAQ</a> | 
    <a href="contact.html" data-i18n="contact">Contact</a>
  </footer>

  <div id="propertyModal" class="modal" style="display:none;">
    <div class="modal-content" style="max-width:600px;">
      <span class="close-btn" onclick="closePropertyModal()">&times;</span>
      <div id="propertyModalContent"></div>
    </div>
  </div>

  <div id="bookingModal" class="modal" style="display:none;">
    <div class="modal-content" style="max-width:500px;">
      <span class="close-btn" onclick="closeBookingModal()">&times;</span>
      <h2>Request Booking</h2>
      <div id="bookingHouseInfo"></div>
      <form id="bookingForm">
        <div class="form-group">
          <label>Check‑in Date</label>
          <input type="date" id="bookingStart" required>
        </div>
        <div class="form-group">
          <label>Check‑out Date</label>
          <input type="date" id="bookingEnd" required>
        </div>
        <div class="form-group">
          <label>Message (optional)</label>
          <textarea id="bookingMessage" rows="3"></textarea>
        </div>
        <button type="submit" class="upload-btn">Send Request</button>
      </form>
      <div id="bookingStatus" style="margin-top:10px;"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/script.js"></script>
  <script>
    // Set initial language/theme selectors
    document.querySelector('.lang-select').value = localStorage.getItem('language') || 'en';
    document.querySelector('.theme-select').value = localStorage.getItem('theme') || 'light';

    window.openBookingModal = function(houseId, houseName) {
      window.currentBookingHouseId = houseId;
      document.getElementById("bookingHouseInfo").innerHTML = `<p><strong>${houseName}</strong></p>`;
      document.getElementById("bookingStart").value = '';
      document.getElementById("bookingEnd").value = '';
      document.getElementById("bookingMessage").value = '';
      document.getElementById("bookingStatus").innerHTML = '';
      document.getElementById("bookingModal").style.display = "block";
    };
    window.closeBookingModal = function() {
      document.getElementById("bookingModal").style.display = "none";
      window.currentBookingHouseId = null;
    };
    document.getElementById("bookingForm").addEventListener("submit", async e => {
      e.preventDefault();
      const token = localStorage.getItem("token");
      if (!token) {
        alert("Please login to book");
        return;
      }
      const start = document.getElementById("bookingStart").value;
      const end = document.getElementById("bookingEnd").value;
      const message = document.getElementById("bookingMessage").value;
      if (!start || !end) {
        alert("Please select both check‑in and check‑out dates");
        return;
      }
      const statusDiv = document.getElementById("bookingStatus");
      statusDiv.innerHTML = "Sending request...";
      try {
        const res = await fetch("/api/bookings", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token
          },
          body: JSON.stringify({ houseId: window.currentBookingHouseId, startDate: start, endDate: end, message })
        });
        const data = await res.json();
        if (res.ok) {
          statusDiv.innerHTML = "✅ Booking request sent!";
          setTimeout(() => window.closeBookingModal(), 2000);
        } else {
          statusDiv.innerHTML = "❌ " + (data.message || "Error");
        }
      } catch (err) {
        statusDiv.innerHTML = "❌ Network error";
      }
    });
  </script>
</body>
</html>

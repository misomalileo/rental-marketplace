<!DOCTYPE html>
<html>
<head>
  <title>Reset Password | Rental Marketplace</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .form-container {
      max-width: 400px;
      margin: 60px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .form-container h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #2c3e50;
    }
    .form-container input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
    }
    .form-container button {
      width: 100%;
      padding: 12px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    .form-container button:disabled {
      background: #95a5a6;
      cursor: not-allowed;
    }
    .form-container button:hover:not(:disabled) {
      background: #2980b9;
    }
    .message {
      margin-top: 15px;
      text-align: center;
      font-size: 0.9rem;
      padding: 8px;
      border-radius: 6px;
    }
    .message.success {
      background: #d4edda;
      color: #155724;
    }
    .message.error {
      background: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>
<div class="form-container">
  <h2>Set New Password</h2>
  <form id="resetForm">
    <input type="password" id="password" placeholder="New password" required>
    <input type="password" id="confirm" placeholder="Confirm password" required>
    <button type="submit" id="submitBtn">Reset Password</button>
  </form>
  <div id="message"></div>
  <p><a href="login.html">Back to Login</a></p>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');
  const form = document.getElementById('resetForm');
  const passwordInput = document.getElementById('password');
  const confirmInput = document.getElementById('confirm');
  const submitBtn = document.getElementById('submitBtn');
  const messageDiv = document.getElementById('message');

  if (!token) {
    messageDiv.className = 'message error';
    messageDiv.textContent = 'Invalid or missing reset token. Please request a new link.';
    form.style.display = 'none';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const password = passwordInput.value;
    const confirm = confirmInput.value;
    if (password !== confirm) {
      messageDiv.className = 'message error';
      messageDiv.textContent = 'Passwords do not match.';
      return;
    }
    if (password.length < 6) {
      messageDiv.className = 'message error';
      messageDiv.textContent = 'Password must be at least 6 characters.';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Resetting...';
    messageDiv.innerHTML = '';

    try {
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword: password })
      });
      const data = await res.json();
      if (res.ok) {
        messageDiv.className = 'message success';
        messageDiv.textContent = data.message + ' Redirecting...';
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);
      } else {
        messageDiv.className = 'message error';
        messageDiv.textContent = data.message || 'Reset failed.';
      }
    } catch (err) {
      messageDiv.className = 'message error';
      messageDiv.textContent = 'Network error. Please try again.';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Reset Password';
    }
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Reset Password | Khomo Lathu</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      top: -100px;
      left: -100px;
      animation: float 20s infinite;
    }
    body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      bottom: -150px;
      right: -150px;
      animation: float 25s infinite reverse;
    }
    @keyframes float {
      0% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(30px, 20px) rotate(10deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }
    .container {
      max-width: 480px;
      width: 100%;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      box-shadow: 0 25px 45px rgba(0,0,0,0.2);
      padding: 2rem;
      transition: transform 0.3s ease;
      border: 1px solid rgba(255,255,255,0.3);
      position: relative;
      z-index: 10;
    }
    .container:hover {
      transform: translateY(-5px);
    }
    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .logo i {
      font-size: 3rem;
      background: linear-gradient(135deg, #2563eb, #10b981);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo h2 {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 1.8rem;
      margin-top: 0.5rem;
      background: linear-gradient(135deg, #2c3e50, #3498db);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .input-group {
      margin-bottom: 1rem;
      position: relative;
    }
    .input-group label {
      display: block;
      margin-bottom: 0.3rem;
      font-weight: 500;
      font-size: 0.85rem;
      color: #2c3e50;
    }
    .input-group input {
      width: 100%;
      padding: 0.8rem 2.5rem 0.8rem 1rem;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      font-size: 0.95rem;
      transition: all 0.2s;
      background: #fff;
      outline: none;
    }
    .input-group input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
    .password-toggle {
      position: absolute;
      right: 15px;
      bottom: 12px;
      cursor: pointer;
      color: #94a3b8;
      transition: color 0.2s;
      font-size: 1rem;
    }
    .password-toggle:hover {
      color: #2563eb;
    }
    .strength-meter {
      margin-top: 0.3rem;
      height: 4px;
      background: #e2e8f0;
      border-radius: 4px;
      overflow: hidden;
    }
    .strength-meter-fill {
      width: 0%;
      height: 100%;
      transition: width 0.3s;
    }
    .strength-text {
      font-size: 0.7rem;
      margin-top: 0.2rem;
      text-align: right;
      color: #64748b;
    }
    button {
      width: 100%;
      padding: 0.8rem;
      background: linear-gradient(135deg, #2563eb, #1e40af);
      color: white;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    button:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 12px rgba(37,99,235,0.3);
    }
    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    .message {
      margin-top: 1rem;
      padding: 0.8rem;
      border-radius: 40px;
      font-size: 0.8rem;
      text-align: center;
      display: none;
    }
    .message.error {
      background: #fee2e2;
      color: #b91c1c;
      display: block;
    }
    .message.success {
      background: #dcfce7;
      color: #15803d;
      display: block;
    }
    .back-link {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.85rem;
    }
    .back-link a {
      color: #2563eb;
      text-decoration: none;
    }
    .back-link a:hover {
      text-decoration: underline;
    }
    @media (max-width: 640px) {
      .container {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">
    <i class="fas fa-home"></i>
    <h2>Set New Password</h2>
  </div>

  <form id="resetForm">
    <div class="input-group">
      <label><i class="fas fa-lock"></i> New Password</label>
      <input type="password" id="password" placeholder="Enter new password" required>
      <span class="password-toggle" id="togglePassword">
        <i class="far fa-eye"></i>
      </span>
      <div class="strength-meter">
        <div class="strength-meter-fill" id="strengthFill"></div>
      </div>
      <div class="strength-text" id="strengthText"></div>
    </div>
    <div class="input-group">
      <label><i class="fas fa-check-circle"></i> Confirm Password</label>
      <input type="password" id="confirm" placeholder="Confirm new password" required>
      <span class="password-toggle" id="toggleConfirm">
        <i class="far fa-eye"></i>
      </span>
    </div>
    <button type="submit" id="submitBtn">
      <i class="fas fa-key"></i> Reset Password
    </button>
  </form>
  <div id="message" class="message"></div>
  <div class="back-link">
    <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');
  const form = document.getElementById('resetForm');
  const passwordInput = document.getElementById('password');
  const confirmInput = document.getElementById('confirm');
  const submitBtn = document.getElementById('submitBtn');
  const messageDiv = document.getElementById('message');
  const togglePassword = document.getElementById('togglePassword');
  const toggleConfirm = document.getElementById('toggleConfirm');
  const strengthFill = document.getElementById('strengthFill');
  const strengthText = document.getElementById('strengthText');

  if (!token) {
    messageDiv.className = 'message error';
    messageDiv.textContent = 'Invalid or missing reset token. Please request a new link.';
    form.style.display = 'none';
  }

  // Password visibility toggles
  togglePassword.addEventListener('click', () => {
    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordInput.setAttribute('type', type);
    togglePassword.innerHTML = type === 'password' ? '<i class="far fa-eye"></i>' : '<i class="far fa-eye-slash"></i>';
  });
  toggleConfirm.addEventListener('click', () => {
    const type = confirmInput.getAttribute('type') === 'password' ? 'text' : 'password';
    confirmInput.setAttribute('type', type);
    toggleConfirm.innerHTML = type === 'password' ? '<i class="far fa-eye"></i>' : '<i class="far fa-eye-slash"></i>';
  });

  // Password strength meter
  function checkStrength(password) {
    let strength = 0;
    if (password.length >= 8) strength++;
    if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
    if (password.match(/\d/)) strength++;
    if (password.match(/[^a-zA-Z\d]/)) strength++;
    return strength;
  }

  function updateStrengthMeter(password) {
    const strength = checkStrength(password);
    const percent = (strength / 4) * 100;
    strengthFill.style.width = percent + '%';
    if (strength === 0) {
      strengthFill.style.backgroundColor = '#e2e8f0';
      strengthText.textContent = '';
    } else if (strength === 1) {
      strengthFill.style.backgroundColor = '#e74c3c';
      strengthText.textContent = 'Weak';
    } else if (strength === 2) {
      strengthFill.style.backgroundColor = '#f39c12';
      strengthText.textContent = 'Fair';
    } else if (strength === 3) {
      strengthFill.style.backgroundColor = '#2ecc71';
      strengthText.textContent = 'Good';
    } else {
      strengthFill.style.backgroundColor = '#27ae60';
      strengthText.textContent = 'Strong';
    }
  }

  passwordInput.addEventListener('input', (e) => {
    updateStrengthMeter(e.target.value);
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const password = passwordInput.value;
    const confirm = confirmInput.value;

    if (password !== confirm) {
      messageDiv.className = 'message error';
      messageDiv.textContent = 'Passwords do not match.';
      return;
    }
    if (password.length < 8) {
      messageDiv.className = 'message error';
      messageDiv.textContent = 'Password must be at least 8 characters.';
      return;
    }
    const strength = checkStrength(password);
    if (strength < 2) {
      messageDiv.className = 'message error';
      messageDiv.textContent = 'Password is too weak. Use uppercase, lowercase, numbers, and symbols.';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Resetting...';
    messageDiv.style.display = 'none';

    try {
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword: password })
      });
      const data = await res.json();
      if (res.ok) {
        messageDiv.className = 'message success';
        messageDiv.textContent = data.message + ' Redirecting...';
        messageDiv.style.display = 'block';
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);
      } else {
        messageDiv.className = 'message error';
        messageDiv.textContent = data.message || 'Reset failed.';
        messageDiv.style.display = 'block';
      }
    } catch (err) {
      messageDiv.className = 'message error';
      messageDiv.textContent = 'Network error. Please try again.';
      messageDiv.style.display = 'block';
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i class="fas fa-key"></i> Reset Password';
    }
  });
</script>
</body>
</html>

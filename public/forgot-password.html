<!DOCTYPE html>
<html>
<head>
  <title>Forgot Password | Rental Marketplace</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .form-container {
      max-width: 400px;
      margin: 60px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .form-container h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #2c3e50;
    }
    .form-container input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
    }
    .form-container button {
      width: 100%;
      padding: 12px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    .form-container button:disabled {
      background: #95a5a6;
      cursor: not-allowed;
    }
    .form-container button:hover:not(:disabled) {
      background: #2980b9;
    }
    .message {
      margin-top: 15px;
      text-align: center;
      font-size: 0.9rem;
      padding: 8px;
      border-radius: 6px;
    }
    .message.success {
      background: #d4edda;
      color: #155724;
    }
    .message.error {
      background: #f8d7da;
      color: #721c24;
    }
    .message.info {
      background: #d1ecf1;
      color: #0c5460;
    }
  </style>
</head>
<body>
<div class="form-container">
  <h2>Reset Password</h2>
  <p>Enter your email address and we'll send you a reset link.</p>
  <form id="forgotForm">
    <input type="email" id="email" placeholder="Your email" required>
    <button type="submit" id="submitBtn">Send Reset Link</button>
  </form>
  <div id="message"></div>
  <p><a href="login.html">Back to Login</a></p>
</div>

<script>
  const form = document.getElementById('forgotForm');
  const emailInput = document.getElementById('email');
  const submitBtn = document.getElementById('submitBtn');
  const messageDiv = document.getElementById('message');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = emailInput.value.trim();
    if (!email) return;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending...';
    messageDiv.innerHTML = '';
    messageDiv.className = 'message info';
    messageDiv.textContent = 'Sending...';

    try {
      const res = await fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (res.ok) {
        messageDiv.className = 'message success';
        messageDiv.textContent = data.message;
        form.reset();
      } else {
        messageDiv.className = 'message error';
        messageDiv.textContent = data.message || 'Something went wrong.';
      }
    } catch (err) {
      messageDiv.className = 'message error';
      messageDiv.textContent = 'Network error. Please try again.';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send Reset Link';
      // Clear info message after 5 seconds
      setTimeout(() => {
        if (messageDiv.classList.contains('info')) messageDiv.innerHTML = '';
      }, 5000);
    }
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Forgot Password | Khomo Lathu</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      top: -100px;
      left: -100px;
      animation: float 20s infinite;
    }
    body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      bottom: -150px;
      right: -150px;
      animation: float 25s infinite reverse;
    }
    @keyframes float {
      0% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(30px, 20px) rotate(10deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }
    .container {
      max-width: 480px;
      width: 100%;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      box-shadow: 0 25px 45px rgba(0,0,0,0.2);
      padding: 2rem;
      transition: transform 0.3s ease;
      border: 1px solid rgba(255,255,255,0.3);
      position: relative;
      z-index: 10;
    }
    .container:hover {
      transform: translateY(-5px);
    }
    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .logo i {
      font-size: 3rem;
      background: linear-gradient(135deg, #2563eb, #10b981);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo h2 {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 1.8rem;
      margin-top: 0.5rem;
      background: linear-gradient(135deg, #2c3e50, #3498db);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .subtitle {
      text-align: center;
      color: #4b5563;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }
    .input-group {
      margin-bottom: 1rem;
      position: relative;
    }
    .input-group label {
      display: block;
      margin-bottom: 0.3rem;
      font-weight: 500;
      font-size: 0.85rem;
      color: #2c3e50;
    }
    .input-group input {
      width: 100%;
      padding: 0.8rem 2.5rem 0.8rem 1rem;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      font-size: 0.95rem;
      transition: all 0.2s;
      background: #fff;
      outline: none;
    }
    .input-group input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
    .password-toggle {
      position: absolute;
      right: 15px;
      bottom: 12px;
      cursor: pointer;
      color: #94a3b8;
      transition: color 0.2s;
      font-size: 1rem;
    }
    .password-toggle:hover {
      color: #2563eb;
    }
    button {
      width: 100%;
      padding: 0.8rem;
      background: linear-gradient(135deg, #2563eb, #1e40af);
      color: white;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    button:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 12px rgba(37,99,235,0.3);
    }
    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    .message {
      margin-top: 1rem;
      padding: 0.8rem;
      border-radius: 40px;
      font-size: 0.8rem;
      text-align: center;
      display: none;
    }
    .message.error {
      background: #fee2e2;
      color: #b91c1c;
      display: block;
    }
    .message.success {
      background: #dcfce7;
      color: #15803d;
      display: block;
    }
    .message.info {
      background: #d1ecf1;
      color: #0c5460;
      display: block;
    }
    .back-link {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.85rem;
    }
    .back-link a {
      color: #2563eb;
      text-decoration: none;
    }
    .back-link a:hover {
      text-decoration: underline;
    }
    @media (max-width: 640px) {
      .container {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">
    <i class="fas fa-home"></i>
    <h2>Forgot Password?</h2>
  </div>
  <div class="subtitle">Enter your email address and we'll send you a reset link.</div>

  <form id="forgotForm">
    <div class="input-group">
      <label><i class="fas fa-envelope"></i> Email Address</label>
      <input type="email" id="email" placeholder="your@email.com" required>
    </div>
    <button type="submit" id="submitBtn">
      <i class="fas fa-paper-plane"></i> Send Reset Link
    </button>
  </form>
  <div id="message" class="message"></div>
  <div class="back-link">
    <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
  </div>
</div>

<script>
  const form = document.getElementById('forgotForm');
  const emailInput = document.getElementById('email');
  const submitBtn = document.getElementById('submitBtn');
  const messageDiv = document.getElementById('message');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = emailInput.value.trim();
    if (!email) return;

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Sending...';
    messageDiv.className = 'message info';
    messageDiv.textContent = 'Sending reset link...';
    messageDiv.style.display = 'block';

    try {
      const res = await fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (res.ok) {
        messageDiv.className = 'message success';
        messageDiv.textContent = data.message || 'Reset link sent! Check your email.';
        form.reset();
      } else {
        messageDiv.className = 'message error';
        messageDiv.textContent = data.message || 'Something went wrong.';
      }
    } catch (err) {
      messageDiv.className = 'message error';
      messageDiv.textContent = 'Network error. Please try again.';
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
      setTimeout(() => {
        if (messageDiv.classList.contains('info')) messageDiv.style.display = 'none';
      }, 5000);
    }
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Forgot Password | Khomo Lathu</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #1a1a2e 0%, #0f0f1a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255,140,66,0.08), transparent 70%);
      border-radius: 50%;
      top: -100px;
      left: -100px;
      animation: float 20s infinite;
    }
    body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255,215,0,0.05), transparent 70%);
      border-radius: 50%;
      bottom: -150px;
      right: -150px;
      animation: float 25s infinite reverse;
    }
    @keyframes float {
      0% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(30px, 20px) rotate(10deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }
    .container {
      max-width: 480px;
      width: 100%;
      background: rgba(20, 25, 40, 0.75);
      backdrop-filter: blur(16px);
      border-radius: 48px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
      padding: 2rem;
      transition: transform 0.3s ease;
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
      z-index: 10;
    }
    .container:hover {
      transform: translateY(-5px);
    }
    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .logo i {
      font-size: 3rem;
      background: linear-gradient(135deg, #FF8C42, #FFD966);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo h2 {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 1.8rem;
      margin-top: 0.5rem;
      background: linear-gradient(135deg, #ffffff, #FFB347);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .subtitle {
      text-align: center;
      color: #cbd5e1;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }
    .input-group {
      margin-bottom: 1rem;
      position: relative;
    }
    .input-group label {
      display: block;
      margin-bottom: 0.3rem;
      font-weight: 500;
      font-size: 0.85rem;
      color: #cbd5e1;
    }
    .input-group input {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 32px;
      font-size: 0.95rem;
      transition: all 0.2s;
      background: rgba(255,255,255,0.05);
      color: #f1f5f9;
      outline: none;
    }
    .input-group input:focus {
      border-color: #FF8C42;
      box-shadow: 0 0 0 4px rgba(255,140,66,0.2);
      background: rgba(255,255,255,0.1);
    }
    button {
      width: 100%;
      padding: 0.8rem;
      background: linear-gradient(135deg, #FF8C42, #E67E22);
      color: white;
      border: none;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    button:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 12px rgba(230,126,34,0.4);
    }
    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    .message {
      margin-top: 1rem;
      padding: 0.8rem;
      border-radius: 60px;
      font-size: 0.8rem;
      text-align: center;
      display: none;
      backdrop-filter: blur(8px);
      animation: fadeInUp 0.3s ease;
    }
    .message.error {
      background: rgba(220,38,38,0.2);
      color: #fecaca;
      border: 1px solid #ef4444;
    }
    .message.success {
      background: rgba(34,197,94,0.2);
      color: #bbf7d0;
      border: 1px solid #22c55e;
    }
    .message.info {
      background: rgba(59,130,246,0.2);
      color: #bfdbfe;
      border: 1px solid #3b82f6;
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .back-link {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.85rem;
    }
    .back-link a {
      color: #FFB347;
      text-decoration: none;
    }
    .back-link a:hover {
      text-decoration: underline;
    }
    @media (max-width: 640px) {
      .container {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">
    <i class="fas fa-home"></i>
    <h2>Forgot Password?</h2>
  </div>
  <div class="subtitle">Enter your email address and we'll send you a reset link.</div>

  <form id="forgotForm">
    <div class="input-group">
      <label><i class="fas fa-envelope"></i> Email Address</label>
      <input type="email" id="email" placeholder="your@email.com" required>
    </div>
    <button type="submit" id="submitBtn">
      <i class="fas fa-paper-plane"></i> Send Reset Link
    </button>
  </form>
  <div id="message" class="message"></div>
  <div class="back-link">
    <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
  </div>
</div>

<script>
  const form = document.getElementById('forgotForm');
  const emailInput = document.getElementById('email');
  const submitBtn = document.getElementById('submitBtn');
  const messageDiv = document.getElementById('message');

  function showMessage(text, type) {
    messageDiv.textContent = text;
    messageDiv.className = 'message ' + type;
    messageDiv.style.display = 'block';
    setTimeout(() => {
      messageDiv.style.display = 'none';
    }, 5000);
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = emailInput.value.trim();
    if (!email) return;

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Sending...';
    showMessage('Sending reset link...', 'info');

    try {
      const res = await fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (res.ok) {
        showMessage(data.message || 'Reset link sent! Check your email.', 'success');
        form.reset();
      } else {
        showMessage(data.message || 'Something went wrong.', 'error');
      }
    } catch (err) {
      showMessage('Network error. Please try again.', 'error');
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
    }
  });
</script>
</body>
</html>

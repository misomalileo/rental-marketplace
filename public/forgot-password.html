<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Forgot Password | Khomo Lathu</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #eef2f6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .container {
      max-width: 480px;
      width: 100%;
      background: #ffffff;
      border-radius: 32px;
      box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
      padding: 2rem;
      border: 1px solid #e2e8f0;
    }
    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .logo i {
      font-size: 3rem;
      background: linear-gradient(135deg, #FF8C42, #FFD966);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo h2 {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 1.8rem;
      margin-top: 0.5rem;
      color: #1e293b;
    }
    .subtitle {
      text-align: center;
      color: #475569;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }
    .input-group {
      margin-bottom: 1rem;
    }
    .input-group label {
      display: block;
      margin-bottom: 0.3rem;
      font-weight: 500;
      font-size: 0.85rem;
      color: #334155;
    }
    .input-group input {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 1px solid #cbd5e1;
      border-radius: 32px;
      font-size: 0.95rem;
      transition: border-color 0.2s;
      background: #ffffff;
      color: #0f172a;
      outline: none;
    }
    .input-group input:focus {
      border-color: #FF8C42;
      box-shadow: 0 0 0 3px rgba(255,140,66,0.1);
    }
    button {
      width: 100%;
      padding: 0.8rem;
      background: linear-gradient(135deg, #FF8C42, #E67E22);
      color: white;
      border: none;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    button:hover {
      opacity: 0.9;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .message {
      margin-top: 1rem;
      padding: 0.8rem;
      border-radius: 60px;
      font-size: 0.8rem;
      text-align: center;
      display: none;
    }
    .message.error {
      background: #fee2e2;
      color: #b91c1c;
      border: 1px solid #ef4444;
    }
    .message.success {
      background: #dcfce7;
      color: #15803d;
      border: 1px solid #22c55e;
    }
    .message.info {
      background: #dbeafe;
      color: #1e40af;
      border: 1px solid #3b82f6;
    }
    .back-link {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.85rem;
    }
    .back-link a {
      color: #FF8C42;
      text-decoration: none;
    }
    @media (max-width: 640px) {
      .container { padding: 1.5rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">
    <i class="fas fa-home"></i>
    <h2>Forgot Password?</h2>
  </div>
  <div class="subtitle">Enter your email address and we'll send you a reset link.</div>

  <form id="forgotForm">
    <div class="input-group">
      <label><i class="fas fa-envelope"></i> Email Address</label>
      <input type="email" id="email" placeholder="your@email.com" required>
    </div>
    <button type="submit" id="submitBtn">
      <i class="fas fa-paper-plane"></i> Send Reset Link
    </button>
  </form>
  <div id="message" class="message"></div>
  <div class="back-link">
    <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
  </div>
</div>

<script>
  const form = document.getElementById('forgotForm');
  const emailInput = document.getElementById('email');
  const submitBtn = document.getElementById('submitBtn');
  const messageDiv = document.getElementById('message');

  function showMessage(text, type) {
    messageDiv.textContent = text;
    messageDiv.className = 'message ' + type;
    messageDiv.style.display = 'block';
    setTimeout(() => {
      messageDiv.style.display = 'none';
    }, 5000);
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = emailInput.value.trim();
    if (!email) return;

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Sending...';
    showMessage('Sending reset link...', 'info');

    try {
      const res = await fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (res.ok) {
        showMessage(data.message || 'Reset link sent! Check your email.', 'success');
        form.reset();
      } else {
        showMessage(data.message || 'Something went wrong.', 'error');
      }
    } catch (err) {
      showMessage('Network error. Please try again.', 'error');
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
    }
  });
</script>
</body>
</html>

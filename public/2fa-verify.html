<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Verify 2FA | Khomo Lathu</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: radial-gradient(circle at 10% 20%, #0a0f1e, #03050b);
      color: #f1f5f9;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      max-width: 480px;
      width: 100%;
      background: rgba(20, 30, 45, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 48px;
      padding: 2rem;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 25px 40px -12px rgba(0,0,0,0.5);
      text-align: center;
    }
    .icon {
      font-size: 3rem;
      background: linear-gradient(135deg, #FFD966, #FF8C42);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 1rem;
    }
    h2 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    p {
      color: #94a3b8;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }
    .input-group {
      margin-bottom: 1.5rem;
    }
    .input-group input {
      width: 100%;
      padding: 1rem;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 60px;
      color: white;
      font-size: 1.2rem;
      text-align: center;
      letter-spacing: 4px;
      transition: all 0.2s;
    }
    .input-group input:focus {
      outline: none;
      border-color: #FF8C42;
      box-shadow: 0 0 0 2px rgba(255,140,66,0.2);
    }
    button {
      background: linear-gradient(135deg, #FF8C42, #E67E22);
      border: none;
      padding: 0.9rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    button:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }
    .error {
      background: rgba(231,76,60,0.2);
      border: 1px solid #e74c3c;
      color: #e74c3c;
      padding: 0.7rem;
      border-radius: 60px;
      margin-top: 1rem;
      font-size: 0.8rem;
      display: none;
    }
    .back-link {
      margin-top: 1.5rem;
      font-size: 0.8rem;
    }
    .back-link a {
      color: #FFB347;
      text-decoration: none;
    }
    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="icon"><i class="fas fa-shield-alt"></i></div>
  <h2>Two‑Factor Authentication</h2>
  <p>Enter the 6‑digit code from your authenticator app</p>
  <div class="input-group">
    <input type="text" id="otpCode" placeholder="000000" maxlength="6" autocomplete="off" autofocus>
  </div>
  <button id="verifyBtn"><i class="fas fa-check-circle"></i> Verify & Log In</button>
  <div id="errorMessage" class="error"></div>
  <div class="back-link">
    <a href="login.html"><i class="fas fa-arrow-left"></i> Back to login</a>
  </div>
</div>

<script>
  const tempToken = sessionStorage.getItem('temp2faToken');
  if (!tempToken) {
    window.location.href = '/login.html';
  }

  document.getElementById('verifyBtn').addEventListener('click', async () => {
    const otp = document.getElementById('otpCode').value.trim();
    if (!otp || otp.length !== 6) {
      const errDiv = document.getElementById('errorMessage');
      errDiv.textContent = 'Please enter a valid 6‑digit code';
      errDiv.style.display = 'block';
      return;
    }

    const btn = document.getElementById('verifyBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Verifying...';

    try {
      const res = await fetch('/api/auth/verify-2fa-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tempToken, otp })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.token);
        sessionStorage.removeItem('temp2faToken');
        // Redirect to the page the user originally wanted, or dashboard
        const redirect = sessionStorage.getItem('redirectAfterLogin') || '/dashboard.html';
        sessionStorage.removeItem('redirectAfterLogin');
        window.location.href = redirect;
      } else {
        const errDiv = document.getElementById('errorMessage');
        errDiv.textContent = data.message || 'Invalid OTP code. Please try again.';
        errDiv.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-check-circle"></i> Verify & Log In';
      }
    } catch (err) {
      const errDiv = document.getElementById('errorMessage');
      errDiv.textContent = 'Network error. Please try again.';
      errDiv.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-check-circle"></i> Verify & Log In';
    }
  });

  // Press Enter to submit
  document.getElementById('otpCode').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') document.getElementById('verifyBtn').click();
  });
</script>
</body>
</html>

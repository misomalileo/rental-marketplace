<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lease Negotiation | Khomo Lathu</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body {
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
      color: #1e293b;
      font-size: 0.85rem;
      min-height: 100vh;
    }
    .navbar {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 1.4rem; font-weight: 800; background: linear-gradient(135deg, #2563eb, #0d9488); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .logo i { color: #2563eb; margin-right: 6px; background: none; -webkit-background-clip: unset; }
    .back-link { text-decoration: none; color: #2563eb; font-weight: 500; transition: 0.2s; }
    .back-link:hover { transform: translateX(-4px); display: inline-block; }
    .container { max-width: 1400px; margin: 2rem auto; padding: 0 1.5rem; display: flex; gap: 2rem; flex-wrap: wrap; }
    .negotiation-panel { flex: 2; background: rgba(255,255,255,0.9); backdrop-filter: blur(8px); border-radius: 32px; padding: 1.8rem; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.5); transition: transform 0.2s; }
    .score-panel { flex: 1; background: rgba(255,255,255,0.9); backdrop-filter: blur(8px); border-radius: 32px; padding: 1.8rem; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1); height: fit-content; position: sticky; top: 100px; border: 1px solid rgba(255,255,255,0.5); }
    h2 { font-size: 1.6rem; font-weight: 700; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    h3 { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.8rem; }
    h4 { font-size: 1rem; font-weight: 600; margin: 0.8rem 0 0.5rem; }
    .clause-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 1.2rem;
      margin-bottom: 1rem;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 2px 5px rgba(0,0,0,0.02);
    }
    .clause-card:hover { transform: translateY(-3px); box-shadow: 0 12px 20px -12px rgba(0,0,0,0.15); }
    .clause-card.agreed { background: linear-gradient(135deg, #dcfce7, #f0fdf4); border-color: #10b981; }
    .clause-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem; flex-wrap: wrap; gap: 0.5rem; }
    .clause-title { font-weight: 700; font-size: 1rem; color: #0f172a; }
    .clause-badge { font-size: 0.7rem; padding: 0.2rem 0.6rem; border-radius: 40px; font-weight: 600; }
    .clause-badge.landlord { background: #3b82f6; color: white; }
    .clause-badge.tenant { background: #10b981; color: white; }
    .clause-badge.ai { background: #f59e0b; color: white; }
    .clause-description { font-size: 0.85rem; margin: 0.6rem 0; color: #334155; line-height: 1.4; }
    .clause-actions { display: flex; gap: 0.6rem; margin-top: 0.8rem; flex-wrap: wrap; }
    .btn {
      padding: 0.4rem 1rem;
      border-radius: 40px;
      border: none;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .btn-primary { background: #2563eb; color: white; box-shadow: 0 2px 4px rgba(37,99,235,0.2); }
    .btn-primary:hover { background: #1d4ed8; transform: translateY(-2px); }
    .btn-success { background: #10b981; color: white; }
    .btn-success:hover { background: #059669; transform: translateY(-2px); }
    .btn-warning { background: #f59e0b; color: white; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; transform: translateY(-2px); }
    .btn-outline { background: transparent; border: 1px solid #cbd5e1; color: #334155; }
    .btn-outline:hover { background: #f1f5f9; border-color: #94a3b8; }
    .ai-suggestion {
      background: #fffbeb;
      border-left: 4px solid #f59e0b;
      padding: 1rem;
      margin-bottom: 1rem;
      border-radius: 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.03);
    }
    .lease-score { text-align: center; margin: 1rem 0; }
    .score-gauge { width: 150px; height: 150px; margin: 0 auto; position: relative; }
    .score-value { font-size: 2.5rem; font-weight: 800; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #0f172a; }
    .add-clause { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 2px dashed #cbd5e1; }
    .chat-messages {
      max-height: 280px;
      overflow-y: auto;
      margin: 1rem 0;
      padding: 0.8rem;
      background: #f8fafc;
      border-radius: 20px;
      border: 1px solid #e2e8f0;
    }
    .message { margin-bottom: 0.8rem; padding: 0.6rem 1rem; border-radius: 20px; max-width: 85%; word-wrap: break-word; }
    .message.ai { background: #fef3c7; color: #92400e; align-self: flex-start; margin-right: auto; }
    .message.landlord { background: #dbeafe; color: #1e3a8a; margin-left: auto; text-align: right; }
    .message.tenant { background: #dcfce7; color: #14532d; margin-right: auto; }
    .message small { font-size: 0.6rem; opacity: 0.7; display: block; margin-top: 4px; }
    .input-group { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .input-group input { flex: 1; padding: 0.6rem 1rem; border: 1px solid #e2e8f0; border-radius: 60px; font-size: 0.8rem; outline: none; transition: 0.2s; }
    .input-group input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      background: #e2e8f0;
    }
    .terminate-btn {
      background: #ef4444;
      color: white;
      margin-top: 1rem;
      width: 100%;
      padding: 0.6rem;
    }
    @media (max-width: 768px) { .container { flex-direction: column; } .score-panel { position: static; } }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo"><i class="fas fa-home"></i> Khomo Lathu</div>
    <div><a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Properties</a></div>
  </nav>
  <div class="container">
    <div class="negotiation-panel">
      <h2><i class="fas fa-handshake"></i> Lease Negotiation</h2>
      <div id="negotiationInfo"></div>
      <div id="autoJoinStatus" style="margin: 10px 0;"></div>
      <div id="aiSuggestions"></div>
      <div class="clause-list" id="clauseList"></div>
      <div class="add-clause">
        <h4><i class="fas fa-plus-circle"></i> Propose New Clause</h4>
        <div class="input-group">
          <input type="text" id="newClauseTitle" placeholder="Clause title (e.g., 'Parking')">
          <input type="text" id="newClauseDesc" placeholder="Description">
          <button id="addClauseBtn" class="btn btn-primary">Propose</button>
        </div>
      </div>
      <div style="margin-top: 1.5rem;">
        <h4><i class="fas fa-comments"></i> Negotiation Chat</h4>
        <div id="chatMessages" class="chat-messages"></div>
        <div class="input-group">
          <input type="text" id="chatInput" placeholder="Type a message...">
          <button id="sendChatBtn" class="btn btn-primary">Send</button>
        </div>
      </div>
      <div style="margin-top: 1.5rem; display: flex; gap: 1rem; justify-content: flex-end; flex-wrap: wrap;">
        <button id="finalizeBtn" class="btn btn-success">Finalize & Generate Contract</button>
        <button id="terminateBtn" class="btn btn-danger terminate-btn" style="display: none;">Terminate Negotiation</button>
      </div>
    </div>
    <div class="score-panel">
      <h3><i class="fas fa-chart-line"></i> Lease Score</h3>
      <div class="lease-score">
        <div class="score-gauge">
          <canvas id="scoreGauge" width="150" height="150"></canvas>
          <div class="score-value" id="scoreValue">0</div>
        </div>
        <p id="scoreFeedback"></p>
      </div>
      <h4><i class="fas fa-robot"></i> AI Suggestions</h4>
      <div id="aiSuggestionsSidebar"></div>
      <h4 style="margin-top: 1rem;"><i class="fas fa-info-circle"></i> Lease Summary</h4>
      <div id="leaseSummary"></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location = 'login.html';
    const urlParams = new URLSearchParams(window.location.search);
    const negotiationId = urlParams.get('id');
    if (!negotiationId) window.location = 'index.html';
    let negotiation = null;
    let socket = null;
    let scoreChart = null;
    let currentUserId = null;

    // Get current user ID from token
    try {
      const payload = JSON.parse(atob(token.split('.')[1]));
      currentUserId = payload.id;
    } catch(e) { console.error('Invalid token'); }

    async function loadNegotiation() {
      const res = await fetch(`/api/lease/${negotiationId}`, {
        headers: { Authorization: 'Bearer ' + token }
      });
      if (res.ok) {
        negotiation = await res.json();
        renderNegotiation();
        // Auto-join if tenant and not yet joined
        await autoJoinIfNeeded();
        initWebSocket();
      } else {
        alert('Failed to load negotiation');
      }
    }

    async function autoJoinIfNeeded() {
      if (!negotiation) return;
      // If user is not the landlord and tenantId is null, then join
      const isLandlord = negotiation.landlordId && negotiation.landlordId._id === currentUserId;
      const tenantJoined = negotiation.tenantId !== null && negotiation.tenantId !== undefined;
      if (!isLandlord && !tenantJoined) {
        const joinRes = await fetch(`/api/lease/join/${negotiationId}`, {
          method: 'POST',
          headers: { Authorization: 'Bearer ' + token }
        });
        if (joinRes.ok) {
          const updated = await joinRes.json();
          negotiation = updated;
          document.getElementById('autoJoinStatus').innerHTML = '<div style="background:#dcfce7; padding:8px; border-radius:12px; margin-bottom:10px;"><i class="fas fa-check-circle"></i> You have successfully joined the negotiation!</div>';
          renderNegotiation();
        } else {
          const err = await joinRes.json();
          document.getElementById('autoJoinStatus').innerHTML = `<div style="background:#fee2e2; padding:8px; border-radius:12px; margin-bottom:10px;"><i class="fas fa-exclamation-triangle"></i> Failed to join: ${err.message}</div>`;
        }
      } else if (!isLandlord && tenantJoined) {
        document.getElementById('autoJoinStatus').innerHTML = '<div style="background:#e0e7ff; padding:8px; border-radius:12px; margin-bottom:10px;"><i class="fas fa-info-circle"></i> You are already participating in this negotiation.</div>';
      }
    }

    function renderNegotiation() {
      const isLandlord = negotiation.landlordId && (negotiation.landlordId._id === currentUserId || negotiation.landlordId === currentUserId);
      const isTenant = negotiation.tenantId && (negotiation.tenantId._id === currentUserId || negotiation.tenantId === currentUserId);
      const tenantName = negotiation.tenantId ? (negotiation.tenantId.name || 'Tenant') : 'Not joined yet';
      const landlordName = negotiation.landlordId?.name || 'Landlord';
      
      document.getElementById('negotiationInfo').innerHTML = `
        <div style="display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:1rem;">
          <div><strong><i class="fas fa-home"></i> Property:</strong> ${negotiation.houseId?.name || 'N/A'}</div>
          <div><strong><i class="fas fa-user-tie"></i> Landlord:</strong> ${landlordName}</div>
          <div><strong><i class="fas fa-user"></i> Tenant:</strong> ${tenantName}</div>
          <div><strong><i class="fas fa-flag-checkered"></i> Status:</strong> <span class="badge">${negotiation.status}</span></div>
        </div>
      `;
      
      const clauseContainer = document.getElementById('clauseList');
      clauseContainer.innerHTML = '';
      negotiation.clauses.forEach((clause, idx) => {
        const agreedClass = clause.isAgreed ? 'agreed' : '';
        const badgeClass = clause.suggestedBy === 'ai' ? 'ai' : (clause.suggestedBy === 'landlord' ? 'landlord' : 'tenant');
        const canAgree = (isLandlord || isTenant) && !clause.isAgreed;
        const canEdit = (clause.suggestedBy === 'landlord' && isLandlord) || (clause.suggestedBy === 'tenant' && isTenant) || (clause.suggestedBy === 'ai' && (isLandlord || isTenant));
        
        clauseContainer.innerHTML += `
          <div class="clause-card ${agreedClass}" data-idx="${idx}">
            <div class="clause-header">
              <span class="clause-title">${escapeHtml(clause.title)}</span>
              <span class="clause-badge ${badgeClass}">${clause.suggestedBy || 'user'}</span>
            </div>
            <div class="clause-description">${escapeHtml(clause.description)}</div>
            <div class="clause-actions">
              ${canAgree ? `<button class="btn btn-success agree-clause" data-idx="${idx}"><i class="fas fa-check"></i> Agree</button>` : (clause.isAgreed ? '<span><i class="fas fa-check-circle"></i> Agreed</span>' : '')}
              ${canEdit ? `<button class="btn btn-outline edit-clause" data-idx="${idx}"><i class="fas fa-edit"></i> Edit</button>` : ''}
            </div>
          </div>
        `;
      });
      
      // Attach event listeners
      document.querySelectorAll('.agree-clause').forEach(btn => {
        btn.addEventListener('click', async () => {
          const idx = btn.dataset.idx;
          const res = await fetch(`/api/lease/agree/${negotiationId}/${idx}`, {
            method: 'PUT',
            headers: { Authorization: 'Bearer ' + token }
          });
          if (res.ok) loadNegotiation();
          else alert('Failed to agree');
        });
      });
      document.querySelectorAll('.edit-clause').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = btn.dataset.idx;
          const clause = negotiation.clauses[idx];
          const newDesc = prompt('Edit clause description:', clause.description);
          if (newDesc && newDesc !== clause.description) {
            fetch(`/api/lease/clause/${negotiationId}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
              body: JSON.stringify({ title: clause.title, description: newDesc })
            }).then(res => res.ok && loadNegotiation());
          }
        });
      });

      // AI suggestions in sidebar
      const aiContainer = document.getElementById('aiSuggestionsSidebar');
      if (negotiation.aiSuggestions && negotiation.aiSuggestions.length) {
        aiContainer.innerHTML = negotiation.aiSuggestions.map(s => `
          <div class="ai-suggestion">
            <strong>${escapeHtml(s.title)}</strong><br>
            ${escapeHtml(s.description)}<br>
            <small>${escapeHtml(s.reasoning)}</small>
          </div>
        `).join('');
      } else {
        aiContainer.innerHTML = '<p>No AI suggestions at this time.</p>';
      }

      // Lease score gauge
      const score = negotiation.leaseScore || 0;
      document.getElementById('scoreValue').innerText = score;
      const ctx = document.getElementById('scoreGauge').getContext('2d');
      if (scoreChart) scoreChart.destroy();
      scoreChart = new Chart(ctx, {
        type: 'doughnut',
        data: { datasets: [{ data: [score, 100 - score], backgroundColor: ['#10b981', '#e2e8f0'], borderWidth: 0 }] },
        options: { cutout: '70%', plugins: { tooltip: { enabled: false }, legend: { display: false } } }
      });
      let feedback = '';
      if (score >= 80) feedback = 'Excellent! Very fair lease.';
      else if (score >= 60) feedback = 'Good lease, but could be improved.';
      else feedback = 'This lease has unfair clauses. Consider AI suggestions.';
      document.getElementById('scoreFeedback').innerText = feedback;

      // Lease summary
      document.getElementById('leaseSummary').innerHTML = `
        <p><strong>Rent:</strong> MWK ${negotiation.rentAmount?.toLocaleString()}</p>
        <p><strong>Deposit:</strong> MWK ${negotiation.depositAmount?.toLocaleString()}</p>
        <p><strong>Start:</strong> ${new Date(negotiation.leaseStartDate).toLocaleDateString()}</p>
        <p><strong>End:</strong> ${new Date(negotiation.leaseEndDate).toLocaleDateString()}</p>
        <p><strong>Notice:</strong> ${negotiation.noticePeriodDays} days</p>
        <p><strong>Late Fee:</strong> ${negotiation.lateFeePercentage}%</p>
      `;
      
      // Show terminate button only for landlord
      const isLandlordUser = negotiation.landlordId && (negotiation.landlordId._id === currentUserId || negotiation.landlordId === currentUserId);
      const terminateBtn = document.getElementById('terminateBtn');
      if (terminateBtn) {
        terminateBtn.style.display = isLandlordUser ? 'block' : 'none';
      }
    }

    function initWebSocket() {
      const socketIoScript = document.createElement('script');
      socketIoScript.src = 'https://cdn.socket.io/4.5.0/socket.io.min.js';
      socketIoScript.onload = () => {
        socket = io({ auth: { token } });
        socket.emit('join-negotiation', negotiationId);
        socket.on('negotiation-update', (data) => {
          if (data.negotiation) {
            negotiation = data.negotiation;
            renderNegotiation();
          }
        });
        socket.on('negotiation-message', (msg) => {
          const chatDiv = document.getElementById('chatMessages');
          chatDiv.innerHTML += `<div class="message ${msg.sender}"><strong>${msg.sender}:</strong> ${escapeHtml(msg.text)}<br><small>${new Date(msg.time).toLocaleTimeString()}</small></div>`;
          chatDiv.scrollTop = chatDiv.scrollHeight;
        });
      };
      document.head.appendChild(socketIoScript);
    }

    document.getElementById('addClauseBtn').addEventListener('click', async () => {
      const title = document.getElementById('newClauseTitle').value.trim();
      const desc = document.getElementById('newClauseDesc').value.trim();
      if (!title || !desc) return alert('Both fields required');
      const res = await fetch(`/api/lease/clause/${negotiationId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
        body: JSON.stringify({ title, description: desc })
      });
      if (res.ok) {
        document.getElementById('newClauseTitle').value = '';
        document.getElementById('newClauseDesc').value = '';
        loadNegotiation();
      } else alert('Failed to add clause');
    });

    document.getElementById('sendChatBtn').addEventListener('click', () => {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text || !socket) return;
      socket.emit('negotiation-message', { negotiationId, text });
      input.value = '';
    });

    document.getElementById('finalizeBtn').addEventListener('click', async () => {
      if (!negotiation.tenantId) {
        alert('Tenant must join the negotiation first before finalizing.');
        return;
      }
      const allAgreed = negotiation.clauses.every(c => c.isAgreed);
      if (!allAgreed) {
        alert('Please agree to all clauses before finalizing.');
        return;
      }
      if (confirm('All clauses agreed? Finalize will generate a contract.')) {
        const res = await fetch(`/api/lease/finalize/${negotiationId}`, {
          method: 'POST',
          headers: { Authorization: 'Bearer ' + token }
        });
        const data = await res.json();
        if (res.ok) {
          alert('Contract generated! Redirecting to sign...');
          window.location.href = `sign-contract.html?id=${data.smartContract._id}`;
        } else alert('Error: ' + data.message);
      }
    });

    document.getElementById('terminateBtn')?.addEventListener('click', async () => {
      if (confirm('Are you sure you want to terminate this lease negotiation? This action cannot be undone.')) {
        // You need to implement a DELETE or PUT endpoint to update status to 'expired'
        // For now, we'll just show a message and reload
        alert('Termination feature coming soon. For now, you can manually reject the negotiation.');
        // Optional: call an API to set status = 'expired'
        // const res = await fetch(`/api/lease/terminate/${negotiationId}`, { method: 'PUT', headers: { Authorization: 'Bearer ' + token } });
      }
    });

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    loadNegotiation();
  </script>
</body>
</html>

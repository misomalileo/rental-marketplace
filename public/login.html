<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Khomo Lathu</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 80% 20%, #0f172a, #0a0f1c);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
    }
    body::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(96,165,250,0.08) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: moveBg 40s linear infinite;
      pointer-events: none;
    }
    @keyframes moveBg {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-15%, -15%); }
    }
    .login-container {
      width: 100%;
      max-width: 460px;
      background: rgba(15, 23, 42, 0.65);
      backdrop-filter: blur(16px);
      border-radius: 48px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
      padding: 2rem;
      transition: transform 0.3s, box-shadow 0.3s;
      border: 1px solid rgba(255,255,255,0.15);
      transform-style: preserve-3d;
    }
    .login-container:hover {
      transform: translateY(-6px) rotateX(1.5deg);
      box-shadow: 0 30px 60px -15px rgba(0,0,0,0.6);
    }
    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .logo i {
      font-size: 3.2rem;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo h2 {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 1.9rem;
      background: linear-gradient(135deg, #f0f9ff, #e0e7ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .input-group {
      margin-bottom: 1rem;
      position: relative;
    }
    .input-group label {
      display: block;
      margin-bottom: 0.4rem;
      font-weight: 500;
      font-size: 0.8rem;
      color: #cbd5e1;
    }
    .input-group input {
      width: 100%;
      padding: 0.85rem 2.5rem 0.85rem 1.2rem;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 32px;
      font-size: 0.9rem;
      background: rgba(255,255,255,0.05);
      color: #f1f5f9;
      outline: none;
      transition: all 0.2s;
    }
    .input-group input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59,130,246,0.2);
      background: rgba(255,255,255,0.1);
    }
    .password-toggle {
      position: absolute;
      right: 18px;
      bottom: 14px;
      cursor: pointer;
      color: #94a3b8;
      transition: color 0.2s;
    }
    .password-toggle:hover {
      color: #60a5fa;
    }
    .login-btn {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(105deg, #3b82f6, #2563eb);
      color: white;
      border: none;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.8rem;
      font-family: 'Poppins', sans-serif;
      box-shadow: 0 8px 20px -6px #1e40af;
    }
    .login-btn:hover {
      transform: scale(1.02);
      background: linear-gradient(105deg, #2563eb, #1d4ed8);
    }
    .divider {
      display: flex;
      align-items: center;
      margin: 1.5rem 0;
      color: #64748b;
      font-size: 0.75rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .divider span { margin: 0 0.8rem; }
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 0.7rem;
      border-radius: 60px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      color: #e2e8f0;
      text-decoration: none;
      transition: all 0.2s;
    }
    .social-btn:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,0.12);
      border-color: #3b82f6;
    }
    .forgot-link, .signup-link {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.8rem;
      color: #94a3b8;
    }
    .forgot-link a, .signup-link a {
      color: #60a5fa;
      font-weight: 600;
      text-decoration: none;
    }
    .message {
      margin-top: 1rem;
      padding: 0.8rem;
      border-radius: 60px;
      font-size: 0.8rem;
      text-align: center;
      display: none;
      backdrop-filter: blur(8px);
    }
    .message.error {
      background: rgba(220,38,38,0.2);
      color: #fecaca;
      border: 1px solid #ef4444;
      display: block;
    }
    .message.success {
      background: rgba(34,197,94,0.2);
      color: #bbf7d0;
      border: 1px solid #22c55e;
      display: block;
    }
    @media (max-width: 640px) {
      .login-container { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <i class="fas fa-home"></i>
      <h2>Welcome Back</h2>
    </div>

    <form id="loginForm">
      <div class="input-group">
        <label><i class="fas fa-envelope"></i> Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>
      <div class="input-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
        <span class="password-toggle" id="togglePassword">
          <i class="far fa-eye"></i>
        </span>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> Log In
      </button>
    </form>
    <div id="message" class="message"></div>

    <div class="divider"><span>or continue with</span></div>
    <a href="/api/auth/google" class="social-btn google-btn">
      <i class="fab fa-google"></i> Continue with Google
    </a>

    <div class="forgot-link">
      <a href="forgot-password.html"><i class="fas fa-key"></i> Forgot password?</a>
    </div>
    <div class="signup-link">
      Don't have an account? <a href="register.html">Sign up now</a>
    </div>
  </div>

  <script>
    const togglePassword = document.getElementById('togglePassword');
    const passwordField = document.getElementById('password');
    togglePassword.addEventListener('click', function () {
      const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordField.setAttribute('type', type);
      this.innerHTML = type === 'password' ? '<i class="far fa-eye"></i>' : '<i class="far fa-eye-slash"></i>';
    });

    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('verified') === 'true') {
      showMessage('Email verified! You can now log in.', 'success');
    }
    if (urlParams.get('error') === 'google-auth-failed') {
      showMessage('Google authentication failed.', 'error');
    }

    function showMessage(text, type) {
      const msgDiv = document.getElementById('message');
      msgDiv.textContent = text;
      msgDiv.className = 'message ' + type;
      setTimeout(() => {
        msgDiv.style.display = 'none';
      }, 5000);
    }

    const form = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      loginBtn.disabled = true;
      loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok) {
          if (data.twoFactorRequired) {
            sessionStorage.setItem('temp2faToken', data.tempToken);
            window.location.href = '/2fa-verify.html';
            return;
          }
          localStorage.setItem('token', data.token);
          localStorage.setItem('role', data.user.role);
          // Role-based redirect
          if (data.user.role === 'admin') {
            window.location.href = 'admin.html';
          } else if (data.user.role === 'premium_user' || data.user.role === 'premium_landlord') {
            window.location.href = 'premium-dashboard.html';
          } else if (data.user.role === 'landlord') {
            window.location.href = 'dashboard.html';
          } else {
            window.location.href = 'index.html';
          }
        } else {
          showMessage(data.message || 'Login failed', 'error');
          loginBtn.disabled = false;
          loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Log In';
        }
      } catch (err) {
        showMessage('Network error. Please try again.', 'error');
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Log In';
      }
    });
  </script>
</body>
</html>

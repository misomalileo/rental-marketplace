<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Register | Khomo Lathu</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #1a1a2e 0%, #0f0f1a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,140,66,0.06) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: moveBg 60s linear infinite;
      pointer-events: none;
    }

    @keyframes moveBg {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-20%, -20%); }
    }

    .register-container {
      width: 100%;
      max-width: 520px;
      background: rgba(20, 25, 40, 0.75);
      backdrop-filter: blur(16px);
      border-radius: 48px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
      padding: 2rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      border: 1px solid rgba(255,255,255,0.1);
      transform-style: preserve-3d;
    }

    .register-container:hover {
      transform: translateY(-8px) rotateX(2deg);
      box-shadow: 0 30px 60px -15px rgba(0,0,0,0.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .logo i {
      font-size: 3.2rem;
      background: linear-gradient(135deg, #FF8C42, #FFD966);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .logo h2 {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 1.9rem;
      margin-top: 0.5rem;
      background: linear-gradient(135deg, #ffffff, #FFB347);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .role-badge {
      text-align: center;
      margin-bottom: 1.5rem;
      background: rgba(255,140,66,0.15);
      padding: 0.6rem;
      border-radius: 60px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #FFB347;
      border: 1px solid rgba(255,140,66,0.3);
      backdrop-filter: blur(4px);
    }

    .input-group {
      margin-bottom: 1rem;
    }

    .input-group label {
      display: block;
      margin-bottom: 0.4rem;
      font-weight: 500;
      font-size: 0.8rem;
      color: #cbd5e1;
    }

    .input-group input {
      width: 100%;
      padding: 0.85rem 1.2rem;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 32px;
      font-size: 0.9rem;
      transition: all 0.2s;
      background: rgba(255,255,255,0.05);
      color: #f1f5f9;
      outline: none;
    }

    .input-group input:focus {
      border-color: #FF8C42;
      box-shadow: 0 0 0 4px rgba(255,140,66,0.2);
      background: rgba(255,255,255,0.1);
    }

    .input-group input::placeholder {
      color: #94a3b8;
    }

    .register-btn {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(105deg, #FF8C42, #E67E22);
      color: white;
      border: none;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.8rem;
      font-family: 'Poppins', sans-serif;
      box-shadow: 0 8px 20px -6px rgba(230,126,34,0.4);
    }

    .register-btn:hover {
      transform: scale(1.02);
      background: linear-gradient(105deg, #E67E22, #D35400);
    }

    .register-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 1.5rem 0;
      color: #64748b;
      font-size: 0.75rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .divider span {
      margin: 0 0.8rem;
    }

    .social-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-bottom: 1rem;
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 0.7rem;
      border-radius: 60px;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      color: #e2e8f0;
      text-decoration: none;
    }

    .social-btn i {
      font-size: 1.2rem;
    }

    .social-btn:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,0.12);
      border-color: #FF8C42;
    }

    .login-link {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.8rem;
      color: #94a3b8;
    }

    .login-link a {
      color: #FFB347;
      font-weight: 600;
      text-decoration: none;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    .message {
      margin-top: 1rem;
      padding: 0.8rem;
      border-radius: 60px;
      font-size: 0.8rem;
      text-align: center;
      display: none;
      backdrop-filter: blur(8px);
      animation: fadeInUp 0.3s ease;
    }

    .message.error {
      background: rgba(220,38,38,0.2);
      color: #fecaca;
      border: 1px solid #ef4444;
    }

    .message.success {
      background: rgba(34,197,94,0.2);
      color: #bbf7d0;
      border: 1px solid #22c55e;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .register-container {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="register-container">
    <div class="logo">
      <i class="fas fa-crown"></i>
      <h2>Join Khomo Lathu</h2>
    </div>

    <div id="roleBadge" class="role-badge"></div>

    <form id="registerForm">
      <input type="hidden" id="roleInput" name="role" value="free">
      <div class="input-group">
        <label><i class="fas fa-user"></i> Full Name</label>
        <input type="text" id="name" placeholder="John Doe" required>
      </div>
      <div class="input-group">
        <label><i class="fas fa-envelope"></i> Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>
      <div class="input-group">
        <label><i class="fab fa-whatsapp"></i> WhatsApp Number</label>
        <input type="tel" id="phone" placeholder="265XXXXXXXXX" pattern="265[0-9]{9}" required>
        <small style="font-size: 0.7rem; color: #94a3b8;">Format: 265 followed by 9 digits</small>
      </div>
      <div class="input-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <div class="input-group">
        <label><i class="fas fa-check-circle"></i> Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="••••••••" required>
      </div>
      <button type="submit" class="register-btn" id="registerBtn">
        <i class="fas fa-user-plus"></i> Create Account
      </button>
    </form>
    <div id="message" class="message"></div>

    <div class="divider">
      <span>or sign up with</span>
    </div>

    <div class="social-buttons">
      <a id="googleSignupBtn" class="social-btn google-btn">
        <i class="fab fa-google"></i> Continue with Google
      </a>
      <a href="/api/auth/apple" class="social-btn apple-btn">
        <i class="fab fa-apple"></i> Continue with Apple
      </a>
      <a href="/api/auth/facebook" class="social-btn facebook-btn">
        <i class="fab fa-facebook-f"></i> Continue with Facebook
      </a>
    </div>

    <div class="login-link">
      Already have an account? <a href="login.html">Log in</a>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    let selectedRole = urlParams.get('role');
    if (!selectedRole || !["free", "landlord", "premium_user"].includes(selectedRole)) {
      selectedRole = 'free';
    }

    document.getElementById('roleInput').value = selectedRole;
    const roleBadge = document.getElementById('roleBadge');
    if (selectedRole === 'landlord') {
      roleBadge.innerHTML = '<i class="fas fa-building"></i> You are registering as a Landlord. After email verification, you can list properties.';
    } else if (selectedRole === 'premium_user') {
      roleBadge.innerHTML = '<i class="fas fa-crown"></i> You are registering as a Premium User. After email verification, you unlock exclusive features.';
    } else {
      roleBadge.innerHTML = '<i class="fas fa-user"></i> You are registering as a Renter. Please verify your email to start searching.';
    }

    const googleLink = document.getElementById('googleSignupBtn');
    if (googleLink) {
      googleLink.href = `/api/auth/google?role=${selectedRole}`;
    }

    const form = document.getElementById('registerForm');
    const registerBtn = document.getElementById('registerBtn');
    const messageDiv = document.getElementById('message');

    function showMessage(text, type) {
      messageDiv.textContent = text;
      messageDiv.className = 'message ' + type;
      messageDiv.style.display = 'block';
      setTimeout(() => {
        messageDiv.style.display = 'none';
      }, 6000);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const role = document.getElementById('roleInput').value;

      if (!name || !email || !phone || !password || !confirmPassword) {
        showMessage('Please fill in all fields.', 'error');
        return;
      }
      if (!/^265[0-9]{9}$/.test(phone)) {
        showMessage('Phone number must be 265 followed by 9 digits (e.g., 265881535985).', 'error');
        return;
      }
      if (password !== confirmPassword) {
        showMessage('Passwords do not match.', 'error');
        return;
      }
      if (password.length < 8) {
        showMessage('Password must be at least 8 characters.', 'error');
        return;
      }

      registerBtn.disabled = true;
      registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, phone, password, role })
        });
        const data = await res.json();
        if (res.ok) {
          showMessage('Account created! 📧 Please check your email (including spam) to verify your account.', 'success');
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 3000);
        } else {
          showMessage(data.message || 'Registration failed.', 'error');
          registerBtn.disabled = false;
          registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
        }
      } catch (err) {
        showMessage('Network error. Please try again.', 'error');
        registerBtn.disabled = false;
        registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
      }
    });
  </script>
</body>
</html>

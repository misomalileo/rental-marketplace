<!DOCTYPE html>
<html>
<head>
  <title>Register | Rental Marketplace</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f4f4f4; }
    .form-container { max-width: 400px; margin: 60px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .form-container h2 { text-align: center; margin-bottom: 20px; color: #2c3e50; }
    .form-container input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 1rem; }
    .form-container button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .form-container button:hover { background: #2980b9; }
    .google-btn { background: white; border: 1px solid #e0e0e0; color: #2c3e50; display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 12px; width: 100%; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .google-btn:hover { background: #f8f9fa; }
  </style>
</head>
<body>
<div class="form-container">
  <h2>Create Landlord Account</h2>
  <form id="registerForm">
    <input type="text" placeholder="Full Name" id="name" required>
    <input type="email" placeholder="Email" id="email" required>
    <input type="text" placeholder="WhatsApp Number (265...)" id="phone" required>
    <input type="password" placeholder="Password" id="password" required>
    <input type="password" placeholder="Confirm Password" id="confirmPassword" required>
    <button type="submit">Register</button>
  </form>
  <a href="/api/auth/google">
    <button class="google-btn" type="button">
      <i class="fab fa-google" style="font-size: 1.2rem;"></i> Sign up with Google
    </button>
  </a>
  <p style="text-align:center; margin-top:20px;">Already have an account? <a href="login.html">Login</a></p>
</div>
<script>
document.getElementById("registerForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        password: document.getElementById("password").value,
        confirmPassword: document.getElementById("confirmPassword").value
    };
    const res = await fetch("/api/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });
    const result = await res.json();
    alert(result.message);
    if (res.ok) window.location.href = "login.html";
});
</script>
</body>
</html>
